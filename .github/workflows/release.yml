name: Release (.dmg)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Created and pushed if missing."
        required: true
        default: "v0.1.0-dev"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build .dmg and attach to GitHub Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$version"

      - name: Build app
        run: pnpm build

      - name: Package .app (unsigned)
        run: pnpm exec electron-builder --mac dir --publish never

      - name: Ad-hoc sign .app
        run: |
          app=$(find release/mac* -maxdepth 1 -name "*.app" | head -1)
          codesign --deep --force --sign - "$app"

      - name: Create .dmg from signed .app
        run: |
          app=$(find release/mac* -maxdepth 1 -name "*.app" | head -1)
          pnpm exec electron-builder --mac dmg --prepackaged "$app" --publish never

      - name: Locate DMG
        id: dmg
        run: |
          dmg=$(ls -1 release/*.dmg | head -1)
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Claude Grove ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            ${{ steps.dmg.outputs.path }}
            release/*.dmg.blockmap
            release/latest-mac.yml
